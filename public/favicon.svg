<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jim+Nightshade&display=swap');
      .background { fill: #f5f5f2; }
      .symbol { fill: #2d2d2b; font-family: 'Jim Nightshade', cursive; font-size: 70px; font-weight: 400; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>
  <!-- Light background matching app background -->
  <rect class="background" width="100" height="100"/>
  <!-- Decorative border -->
  <rect class="background" width="100" height="100" rx="0" fill="none" stroke="#e0e0d9" stroke-width="1"/>
  <!-- Symbol matching app's decorative element -->
  <text class="symbol" x="50" y="50">✦</text>
</svg>
